# Support Desk Investigator - Docker Compose
# Based on official Helpdesk Docker setup: https://github.com/frappe/helpdesk/blob/develop/docker/docker-compose.yml

services:
  # Database
  mariadb:
    image: mariadb:11.8
    container_name: support-desk-mariadb
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      start_period: 5s
      interval: 5s
      timeout: 5s
      retries: 5
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --skip-character-set-client-handshake
      - --skip-innodb-read-only-compressed
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-123}
      MARIADB_AUTO_UPGRADE: 1
    volumes:
      - mariadb-data:/var/lib/mysql
    networks:
      - support-desk-net

  # Redis
  redis:
    image: redis:6.2-alpine
    container_name: support-desk-redis
    networks:
      - support-desk-net

  # Frappe Bench with Helpdesk
  frappe:
    image: frappe/bench:latest
    container_name: support-desk-frappe
    platform: linux/amd64
    entrypoint: bash /workspace/init.sh
    working_dir: /home/frappe
    ports:
      - "${HTTP_PUBLISH_PORT:-8080}:8000"
      - "9000:9000"
    volumes:
      - ./scripts/init.sh:/workspace/init.sh:ro
      - ./scripts/seed-db.sql:/workspace/seed-db.sql:ro
    depends_on:
      mariadb:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - support-desk-net

  # Backend - API service for webhooks and tools
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: support-desk-backend
    ports:
      - "8000:8000"
    environment:
      - BRAINTRUST_API_KEY=${BRAINTRUST_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - VARIANT=${VARIANT:-baseline}
      - AGENT_URL=${AGENT_URL:-http://agent:8001}
      - QDRANT_URL=${QDRANT_URL:-http://qdrant:6333}
      - EMBEDDING_MODEL=${EMBEDDING_MODEL:-all-MiniLM-L6-v2}
      - FRAPPE_URL=${FRAPPE_URL:-http://frappe:8000}
      - FRAPPE_API_KEY=${FRAPPE_API_KEY:-Administrator}
      - FRAPPE_API_SECRET=${FRAPPE_API_SECRET:-admin123}
    volumes:
      - ./src:/app/src:ro
    networks:
      - support-desk-net
    depends_on:
      - frappe
      - qdrant

  # Agent - Investigation workflow service
  agent:
    build:
      context: .
      dockerfile: Dockerfile.agent
    container_name: support-desk-agent
    ports:
      - "8001:8001"
    environment:
      - BRAINTRUST_API_KEY=${BRAINTRUST_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - ADK_MODEL=${ADK_MODEL:-claude-haiku-4-5-20251001}
      - VARIANT=${VARIANT:-baseline}
      - BACKEND_URL=${BACKEND_URL:-http://backend:8000}
    volumes:
      - ./src:/app/src:ro
    networks:
      - support-desk-net

  # Qdrant - Vector database for incident similarity search
  qdrant:
    image: qdrant/qdrant:v1.16.3
    container_name: support-desk-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant-data:/qdrant/storage
    networks:
      - support-desk-net

networks:
  support-desk-net:
    driver: bridge

volumes:
  mariadb-data:
  qdrant-data:
